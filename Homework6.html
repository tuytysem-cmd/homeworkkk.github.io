<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>home work</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Khmer OS Siemreap', sans-serif;
        display: flex;
        justify-content: center;
        background-color: #f5f5f5;
        padding: 40px 0;
      }
      .form-container {
        width: 100%;
        max-width: 500px;
      }

      fieldset {
        border: 2px solid rgba(91, 11, 220, 0.674); 
        padding: 20px;
        margin-bottom: 25px;
        background-color: white;
      }

      legend {
        font-family: 'Khmer OS Muol Light', sans-serif; 
        color: blue;
        padding: 0 10px;
      }

      label {
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input[type="text"],
      input[type="date"],
      input[type="email"],
      input[type="password"],
      select {
        width: 100%; 
        padding: 10px;
        font-family: 'Khmer OS Siemreap', sans-serif;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-bottom: 5px;
      }

      input[type="radio"], 
      input[type="checkbox"] {
        margin-right: 5px;
        margin-left: 5px;
        cursor: pointer;
      }

      .button-group {
        display: flex;
        justify-content: center;
        margin-top: 10px;
        gap: 15px;
      }

      button {
        padding: 10px 30px;
        font-size: 16px;
        font-family: 'Khmer OS Siemreap', sans-serif;
        font-weight: bold;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <form>
        <fieldset>
          <legend>១. ព័ត៌មានផ្ទាល់ខ្លួន</legend>
          
          <label for="txtName">ឈ្មោះពេញ:</label>
          <input
            type="text"
            name="ឈ្មោះពេញ"
            id="txtName"
            placeholder="បញ្ចូលឈ្មោះ"
          />

          <label for="date">ថ្ងៃខែឆ្នាំកំណើត:</label>
          <input type="date" name="userbirth" id="date" />

          <label>ភេទ:</label>
          <input type="radio" name="gender" id="male" />ប្រុស
          <input type="radio" name="gender" id="female" />ស្រី

          <label for="province">ខេត្ត/រាជធានីកំណើត:</label>
          <select name="province" id="province">
            <option value="">--- ជ្រើសរើសខេត្ត/រាជធានី ---</option>
            <option value="Phnom Penh">ភ្នំពេញ</option>
            <option value="Siem Reap">សៀមរាប</option>
            <option value="Sihanoukville">ព្រះសីហនុ</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>២. ព័ត៌មានការសិក្សា</legend>
          
          <label for="academicYear">ឆ្នាំសិក្សា:</label>
          <select name="academicYear" id="academicYear">
            <option value="1">ឆ្នាំទី ១</option>
            <option value="2">ឆ្នាំទី ២</option>
            <option value="3">ឆ្នាំទី ៣</option>
            <option value="4">ឆ្នាំទី ៤</option>
          </select>

          <label>ជំនាញដែលចូលចិត្ត:</label>
          <input type="checkbox" name="skills" id="webdev" />Web Dev <br />
          <input type="checkbox" name="skills" id="uiux" />UX/UI Design <br />
          <input type="checkbox" name="skills" id="net" />Networking
        </fieldset>

        <fieldset>
          <legend>៣. គណនីសុវត្ថិភាព</legend>
          
          <label for="txtemail">អ៊ីមែល:</label>
          <input
            type="email"
            name="user email"
            id="txtemail"
            placeholder="example@email.com"
          />

          <label for="txtpasword">លេខកូដសម្ងាត់:</label>
          <input
            type="password"
            name="user pasword"
            id="txtpasword"
            placeholder="បញ្ចូលលេខកូដ"
            minlength="8"
            maxlength="12"
            required
          />
        </fieldset>

        <div class="button-group">
          <button type="submit" style="background-color: rgb(18, 225, 18);">រក្សាទុក (Submit)</button>
          <button type="reset" style="background-color: red;">សម្អាត (Clear)</button>
        </div>
      </form>
    </div>
  </body>
</html>
