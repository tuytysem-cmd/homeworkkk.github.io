<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>home work</title>
    <style>
      legend {
        font-family: khmer os muol light;
        color: blue;
      }
      body {
        font-family: khmer os siemreap;
        display: flex;
        justify-content: center;
      }
      fieldset {
        border: 1px solid rgba(91, 11, 220, 0.674);
      }
      div {
        width: 500px;
      }
      input[type="text"],
      input[type="date"],
      input[type="email"],
      input[type="password"],
      select {
        width: 100%;
        font-family: khmer os siemreap;
        max-width: 450px;
      }
      .button{
        display: flex;
        justify-content: center;
        margin-top: 5px;
        gap: 10px;
      }
      button{
        border: 1px solid;
      }
    </style>
  </head>
  <body>
    <div>
      <form>
        <fieldset>
          <legend>១. ព័ត៌មានផ្ទាល់ខ្លួន</legend>
          <label for="txtName">ឈ្មោះពេញ:</label><br />
          <input
            type="text"
            name="ឈ្មោះពេញ"
            id="txtName"
            placeholder="បញ្ចូលឈ្មោះ"
          /><br /><br />
          <label for="date">ថ្ងៃខែឆ្នាំកំណើត:</label><br />
          <input type="date" name="userbirth" id="date" /><br /><br />
          <label for="">ភេទ</label><br />
          <input type="radio" name="gender" id="" />ប្រុស
          <input type="radio" name="gender" id="" />ស្រី <br /><br />
          <label for="">ខេត្ត/រាជធានីកំណើត:</label><br />
          <select name="" id="">
            <option value="">--- ជ្រើសរើសខេត្ត/រាជធានី ---</option>
            <option value="">aaaaaaaa</option>
            <option value="">bbbbbbbbb</option>
            <option value="">cccccccc</option></select
          ><br />
        </fieldset>
        <fieldset>
          <legend>២. ព័ត៌មានការសិក្សា</legend>
          <label for="">ឆ្នាំសិក្សា:</label><br />
          <select name="" id="">
            <option value="">ឆ្នាំទី ១</option>
            <option value="">ឆ្នាំទី ២</option>
            <option value="">ឆ្នាំទី ៣</option>
            <option value="">ឆ្នាំទី ៤</option></select
          ><br /><br />
          <label for="">ជំនាញដែលចូលចិត្ត:</label><br />
          <input type="checkbox" name="" id="" />Web Dev <br />
          <input type="checkbox" name="" id="" />UX/UI Design <br />
          <input type="checkbox" name="" id="" />Networking <br />
        </fieldset>
        <fieldset>
          <legend>៣. គណនីសុវត្ថិភាព</legend>
          <label for="txtemail">អ៊ីមែល:</label><br />
          <input
            type="email"
            name="user email"
            id="txtemail"
            placeholder="example@email.com"
          /><br /><br />
          <label for="txtpasword">លេខកូដសម្ងាត់</label><br />
          <input
            type="password"
            name="user pasword"
            id="txtpasword"
            placeholder="បញ្ចូលលេខកូដ"
            minlength="8"
            maxlength="12"
            required
          />
        </fieldset>
        <div class="button">
          <button type="submit" style="background-color: rgb(18, 225, 18);">រក្សាទុក (Submit)</button>
          <button type="reset" style="background-color: red;">សម្អាត (Clear)</button>
        </div>
      </form>
    </div>
  </body>
</html>
